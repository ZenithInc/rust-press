name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release -p rust-press --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          name="rust-press-v${version}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"

          binary="target/${{ matrix.target }}/release/rust-press"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            binary="${binary}.exe"
          fi

          cp "${binary}" "${staging}/"
          cp README.md LICENSE "${staging}/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            archive="${name}.zip"
            (cd dist && 7z a "../${archive}" "${name}")
          else
            archive="${name}.tar.gz"
            tar -C dist -czf "${archive}" "${name}"
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rust-press-*-${{ matrix.target }}.${{ matrix.archive }}
            rust-press-*-${{ matrix.target }}.${{ matrix.archive }}.sha256

  publish-crates:
    name: Publish crates.io
    needs: test
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish crates
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN secret is required to publish crates." >&2
            exit 1
          fi

          cargo metadata --no-deps --format-version 1 | python3 -c '
          import json
          import os
          import sys

          metadata = json.load(sys.stdin)
          expected = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          versions = {package["version"] for package in metadata["packages"]}
          if versions != {expected}:
              raise SystemExit(f"tag version {expected} does not match workspace versions: {sorted(versions)}")
          '

          crate_published() {
            local crate="$1"
            local response
            response="$(curl -fsSL -H "User-Agent: rust-press-release-check" "https://crates.io/api/v1/crates/${crate}" 2>/dev/null)" || return 1
            CRATE_VERSION="${version}" python3 -c '
          import json
          import os
          import sys

          data = json.load(sys.stdin)
          expected = os.environ["CRATE_VERSION"]
          crate = data.get("crate", {})
          if crate.get("newest_version") == expected or crate.get("max_version") == expected or crate.get("default_version") == expected:
              raise SystemExit(0)
          for version in data.get("versions", []):
              if version.get("num") == expected and not version.get("yanked", False):
                  raise SystemExit(0)
          raise SystemExit(1)
          ' <<< "${response}"
          }

          wait_for_crate() {
            local crate="$1"
            for _ in {1..45}; do
              if crate_published "${crate}"; then
                return 0
              fi
              sleep 20
            done
            echo "${crate} ${version} did not become visible on crates.io in time" >&2
            return 1
          }

          publish_crate() {
            local crate="$1"
            if crate_published "${crate}"; then
              echo "${crate} ${version} is already published; skipping."
              return 0
            fi

            cargo publish --dry-run -p "${crate}"
            cargo publish -p "${crate}"
            wait_for_crate "${crate}"
          }

          publish_crate rustpress-md
          publish_crate rustpress-search
          publish_crate rustpress-theme
          publish_crate rustpress-core
          publish_crate rustpress-dev
          publish_crate rust-press
