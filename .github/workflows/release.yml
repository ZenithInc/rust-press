name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release -p rust-press --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          name="rust-press-v${version}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"

          binary="target/${{ matrix.target }}/release/rust-press"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            binary="${binary}.exe"
          fi

          cp "${binary}" "${staging}/"
          cp README.md LICENSE "${staging}/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            archive="${name}.zip"
            (cd dist && 7z a "../${archive}" "${name}")
          else
            archive="${name}.tar.gz"
            tar -C dist -czf "${archive}" "${name}"
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rust-press-*-${{ matrix.target }}.${{ matrix.archive }}
            rust-press-*-${{ matrix.target }}.${{ matrix.archive }}.sha256
