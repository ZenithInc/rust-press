[theme]
name = "default"
skin = "light"
allow_switch = true
github_url = "https://github.com/ZenithInc/rust-press"

[markdown]
mermaid = true
code_highlight = true
heading_anchors = true

[search]
enabled = true
languages = ["zh", "en", "ja", "ko"]
index_code = false

[access]
enabled = true
mode = "mask"
password = "rustpress"
password_hint = "Enter password"
